name: Format probe

on:
  push:
    branches:
      - refactor/central-phenix-context

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture canonical nixfmt output
        run: |
          nix develop --accept-flake-config --command nixfmt \
            modules/home/context.nix \
            modules/nixos/context.nix \
            modules/outputs.nix
          git diff -- modules/home/context.nix modules/nixos/context.nix modules/outputs.nix > nixfmt.patch
          test -s nixfmt.patch

      - name: Upload formatter patch
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: nixfmt-patch
          path: nixfmt.patch
          if-no-files-found: error
