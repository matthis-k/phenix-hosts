name: Update migrated DE lock

on:
  push:
    branches:
      - migration/newxos-host-configs

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Phenix DE input
        run: nix flake update phenix-de --accept-flake-config
      - name: Commit lock update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore: update migrated Phenix DE input"
            git push
          fi
