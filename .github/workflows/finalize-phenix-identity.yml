name: Finalize Phenix host identity

on:
  push:
    branches:
      - cleanup/den-flake-structure

permissions:
  contents: write

jobs:
  rename:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: cleanup/den-flake-structure
          fetch-depth: 0
      - name: Rename host and option identity
        run: |
          python3 - <<'PY'
          from pathlib import Path

          excluded = {Path('flake.lock'), Path('.github/workflows/finalize-phenix-identity.yml')}
          replacements = [
              ('matthisk-laptop-newxos', 'matthisk-laptop-phenix'),
              ('matthisk-desktop-newxos', 'matthisk-desktop-phenix'),
              ('NEWXOS_', 'PHENIX_'),
              ('NEWXOS', 'PHENIX'),
              ('NewXOS', 'Phenix'),
              ('newxos', 'phenix'),
          ]

          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path in excluded:
                  continue
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              updated = text
              for old, new in replacements:
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated)

          Path('modules/nixos/dev-mode.nix').write_text('''{ lib, ... }:
          {
            options.phenix.devMode = lib.mkOption {
              type = lib.types.bool;
              default = false;
              description = "Whether desktop packages should use live repository configuration files.";
            };

            config.specialisation.dev = {
              inheritParentConfig = true;
              configuration = {
                phenix.devMode = true;
                environment.sessionVariables.PHENIX_DEV = "1";
              };
            };
          }
          ''')

          workstation = Path('modules/nixos/workstation.nix')
          text = workstation.read_text()
          text = text.replace('  environment.sessionVariables = {\n    PHENIX_HOST = config.networking.hostName;\n    PHENIX_HOST = config.networking.hostName;\n  };',
                              '  environment.sessionVariables.PHENIX_HOST = config.networking.hostName;')
          workstation.write_text(text)

          Path('modules/home/matthisk.nix').write_text('''{ inputs }:
          {
            config,
            lib,
            osConfig ? null,
            pkgs,
            ...
          }:
          let
            system = pkgs.stdenv.hostPlatform.system;
            piPackage = inputs.phenix-agent-harness.packages.${system}.pi;
            hostDevMode = if osConfig == null then false else osConfig.phenix.devMode or false;
            enableRuntimeLuaImport =
              osConfig != null && (osConfig.phenix.de.hyprland.enableRuntimeLuaImport or false);
            phenixCli = pkgs.writeShellApplication {
              name = "phenix";
              runtimeInputs = [ pkgs.coreutils ];
              text = ''
                command="''${1:-}"
                case "$command" in
                  ai)
                    shift
                    workspace="''${PHENIX_FLAKE:-$HOME/phenix/repos/phenix}"
                    if [ ! -d "$workspace" ]; then
                      echo "Phenix workspace not found at $workspace" >&2
                      exit 1
                    fi
                    cd "$workspace"
                    exec ${piPackage}/bin/pi "$@"
                    ;;
                  switch)
                    shift
                    flake="''${PHENIX_FLAKE:-$HOME/phenix/repos/phenix}"
                    if [ ! -e "$flake/flake.nix" ]; then
                      flake="github:matthis-k/phenix"
                    fi
                    host="''${PHENIX_HOST:-$(${pkgs.coreutils}/bin/cat /etc/hostname)}"
                    exec /run/wrappers/bin/sudo /run/current-system/sw/bin/nixos-rebuild \
                      switch --flake "$flake#$host" "$@"
                    ;;
                  reload-shell)
                    shift
                    exec ${pkgs.systemd}/bin/systemctl --user restart phenix-shell.service "$@"
                    ;;
                  *)
                    echo "usage: phenix {ai|switch|reload-shell}" >&2
                    exit 2
                    ;;
                esac
              '';
              meta.description = "Operate the local Phenix workstation";
            };
          in
          {
            imports = [
              ./users-matthisk-base.nix
              ./users-matthisk-ssh.nix
              ./git.nix
              inputs.phenix-de.homeModules.default
            ];

            options.phenix.devMode = lib.mkOption {
              type = lib.types.bool;
              default = false;
              description = "Use live Phenix desktop configuration sources.";
            };

            config = {
              phenix.devMode = lib.mkDefault hostDevMode;

              home = {
                packages = [
                  phenixCli
                  inputs.phenix-nvim.packages.${system}.nvim-nix
                  piPackage
                ];

                file.".config/hypr/nix-import.lua" = lib.mkIf enableRuntimeLuaImport {
                  source = lib.mkForce (
                    pkgs.runCommand "phenix-hyprland-nix-import-symlink" { } ''
                      ln -s /run/phenix/hypr/nix-import.lua "$out"
                    ''
                  );
                };

                sessionVariables = {
                  PHENIX_ROOT = "${config.home.homeDirectory}/phenix";
                  PHENIX_FLAKE = "${config.home.homeDirectory}/phenix/repos/phenix";
                  PHENIX_DE_ROOT = "${config.home.homeDirectory}/phenix/repos/phenix-de";
                }
                // lib.optionalAttrs config.phenix.devMode {
                  PHENIX_DEV = "1";
                };
              };
            };
          }
          ''')

          architecture = Path('docs/architecture.md')
          text = architecture.read_text()
          text = text.replace('- Compatibility names such as `phenix.*` and `*-phenix` remain until hardware\n  cutover has been verified.\n', '')
          architecture.write_text(text)
          PY
      - name: Commit rename
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: finalize Phenix host identity"
          git push origin HEAD:cleanup/den-flake-structure
