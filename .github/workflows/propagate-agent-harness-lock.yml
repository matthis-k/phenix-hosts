name: Propagate agent harness lock

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - name: Update agent harness input
        run: nix flake update phenix-agent-harness
      - name: Commit lock update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git diff --cached --quiet || git commit -m "chore: update phenix-agent-harness input"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
