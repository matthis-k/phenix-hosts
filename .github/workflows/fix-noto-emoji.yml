name: Fix Noto emoji package

on:
  push:
    branches:
      - cleanup/den-flake-structure

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: cleanup/den-flake-structure
      - name: Replace renamed package
        run: |
          grep -RIl --exclude-dir=.git --exclude=flake.lock 'noto-fonts-emoji' . | xargs -r sed -i 's/noto-fonts-emoji/noto-fonts-color-emoji/g'
          if grep -RIn --exclude-dir=.git --exclude=flake.lock 'noto-fonts-emoji' .; then
            exit 1
          fi
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: use renamed Noto color emoji package'
          git push origin HEAD:cleanup/den-flake-structure
