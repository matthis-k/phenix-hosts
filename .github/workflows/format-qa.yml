name: Format QA patch

on:
  push:
    branches: [fix/hosts-qa-hardening]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: cachix/install-nix-action@a49548c11d98431cddfb8368fd83d5badbf9bfd # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: devenv
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Format Nix sources
        run: devenv tasks run maintenance:fix:format
      - name: Commit canonical formatting
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/format-qa.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/nixos/services/llm-server.nix .github/workflows/format-qa.yml
          git diff --cached --check
          git commit -m "style: apply canonical Nix formatting"
          git push origin HEAD:fix/hosts-qa-hardening
