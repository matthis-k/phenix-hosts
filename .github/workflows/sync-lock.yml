name: Generate lock update

on:
  push:
    branches:
      - sync/phenix-tasks

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: sync/phenix-tasks
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - name: Update harness lock
        run: |
          set -euo pipefail
          nix flake lock --update-input phenix-agent-harness
          if git diff --quiet -- flake.lock; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git commit -m "chore(inputs): update phenix-agent-harness"
          git push origin HEAD:sync/phenix-tasks
