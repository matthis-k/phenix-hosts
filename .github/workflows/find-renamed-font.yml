name: Find renamed font

on:
  push:
    branches:
      - cleanup/den-flake-structure

permissions:
  contents: read

jobs:
  locate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: cleanup/den-flake-structure
      - name: Locate stale package reference
        run: |
          grep -RIn --exclude-dir=.git --exclude=flake.lock 'noto-fonts-emoji\|noto-fonts-color-emoji' . || true
