name: Finalize host migration

on:
  push:
    branches:
      - migration/newxos-host-configs

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Update lock graph and normalize Nix sources
        run: |
          nix flake update --accept-flake-config
          nix develop --accept-flake-config --command statix fix
          nix develop --accept-flake-config --command sh -c \
            'find . -path ./.git -prune -o -name "*.nix" -type f -print0 | xargs -0 nixfmt'
      - name: Commit generated changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock '*.nix' modules
          if ! git diff --cached --quiet; then
            git commit -m "chore: finalize migrated host configuration"
            git push
          fi
