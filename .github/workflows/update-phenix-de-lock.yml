name: Update Phenix DE lock

on:
  push:
    branches:
      - cleanup/den-flake-structure

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: cleanup/den-flake-structure
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Update Phenix DE input
        run: nix flake update phenix-de --accept-flake-config
      - name: Commit generated lock through GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_sha="$(gh api 'repos/${{ github.repository }}/contents/flake.lock?ref=cleanup/den-flake-structure' --jq .sha)"
          content="$(base64 -w0 flake.lock)"
          gh api --method PUT 'repos/${{ github.repository }}/contents/flake.lock' \
            -f message='chore: repin Phenix DE emoji fix' \
            -f content="$content" \
            -f sha="$current_sha" \
            -f branch='cleanup/den-flake-structure'
