name: Import NewXOS host configuration

on:
  push:
    branches:
      - migration/newxos-host-configs

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out Phenix hosts
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Check out migration source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: matthis-k/newxos
          ref: 701edb5b3026ac8ea46440c12fcbeab598ee0e53
          path: .migration/newxos

      - name: Import machine-specific configuration
        run: |
          set -euo pipefail

          mkdir -p \
            modules/nixos/hardware \
            modules/nixos/storage \
            modules/nixos/boot \
            modules/nixos/services \
            secrets

          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('.migration/newxos')

          def extract(source: str, marker: str, destination: str, factory: bool = False) -> None:
              text = (root / source).read_text()
              try:
                  rhs = text.split(marker, 1)[1]
              except IndexError as exc:
                  raise SystemExit(f'marker not found in {source}: {marker}') from exc
              rhs = re.sub(r';\n}\s*$', '', rhs).strip() + '\n'
              if factory:
                  rhs = '{ inputs }:\n' + rhs
              Path(destination).write_text(rhs)

          extract(
              'modules/hosts/matthisk-laptop-newxos/hardware-configuration.nix',
              '  flake.modules.nixos.matthisk-laptop-newxos =',
              'modules/nixos/hardware/laptop.nix',
          )
          extract(
              'modules/hosts/matthisk-desktop-newxos/hardware-configuration.nix',
              '  flake.modules.nixos.matthisk-desktop-newxos =',
              'modules/nixos/hardware/desktop.nix',
          )
          extract(
              'modules/hosts/matthisk-laptop-newxos/filesystem.nix',
              '  flake.modules.nixos.matthisk-laptop-newxos =',
              'modules/nixos/storage/laptop.nix',
          )
          extract(
              'modules/hosts/matthisk-desktop-newxos/filesystem.nix',
              '  flake.modules.nixos.matthisk-desktop-newxos =',
              'modules/nixos/storage/desktop.nix',
          )
          extract(
              'modules/hosts/matthisk-laptop-newxos/boot.nix',
              '  flake.modules.nixos.matthisk-laptop-newxos =',
              'modules/nixos/boot/laptop.nix',
          )
          extract(
              'modules/hosts/matthisk-desktop-newxos/boot.nix',
              '  flake.modules.nixos.matthisk-desktop-newxos =',
              'modules/nixos/boot/desktop.nix',
          )
          extract(
              'modules/network/nordvpn/service.nix',
              '  flake.modules.nixos.nordvpn =',
              'modules/nixos/services/nordvpn.nix',
              factory=True,
          )
          extract(
              'modules/desktop/llm-server.nix',
              '  flake.modules.nixos.llm-server =',
              'modules/nixos/services/llm-server.nix',
          )
          PY

          cp .migration/newxos/.sops.yaml .sops.yaml
          cp .migration/newxos/secrets/home_network_id.pub secrets/home_network_id.pub
          cp .migration/newxos/secrets/home_network_id secrets/home_network_id
          cp .migration/newxos/secrets/github_id secrets/github_id
          cp .migration/newxos/secrets/github_token secrets/github_token
          cp .migration/newxos/secrets/nordvpn_token secrets/nordvpn_token

          rm -rf .migration

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Update inputs
        run: nix flake update --accept-flake-config

      - name: Commit imported configuration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .sops.yaml secrets modules/nixos/hardware modules/nixos/storage modules/nixos/boot modules/nixos/services flake.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore: import NewXOS host configuration"
            git push
          fi
