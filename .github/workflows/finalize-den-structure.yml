name: Finalize Den structure

on:
  push:
    branches:
      - cleanup/den-flake-structure

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Regenerate flake and lock graph
        run: |
          nix run .#write-flake --accept-flake-config
          nix flake update --accept-flake-config
          nix develop --accept-flake-config --command nixfmt \
            outputs.nix \
            modules/default.nix \
            modules/inputs.nix \
            modules/den.nix \
            modules/outputs.nix \
            modules/development.nix \
            modules/nixos/workstation.nix \
            modules/nixos/hosts/laptop.nix \
            modules/nixos/hosts/desktop.nix \
            modules/nixos/users-matthisk.nix \
            modules/home/matthisk.nix
      - name: Commit generated files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.nix flake.lock outputs.nix modules
          if ! git diff --cached --quiet; then
            git commit -m "chore: finalize Den flake structure"
            git push
          fi
