name: Format host migration

on:
  push:
    branches:
      - migration/newxos-host-configs

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply deterministic Nix formatting and lint fixes
        run: |
          nix develop --accept-flake-config --command bash -c '
            mapfile -d "" files < <(find . -path ./.git -prune -o -name "*.nix" -type f -print0)
            nixfmt "${files[@]}"
            statix fix
          '
      - name: Commit formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.nix modules
          if ! git diff --cached --quiet; then
            git commit -m "chore: format migrated host configuration"
            git push
          fi
